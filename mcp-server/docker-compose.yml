version: '3.8'

services:
  mcp-server:
    build: .
    container_name: propfirms-mcp-server
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - TICKETING_BASE_URL=${TICKETING_BASE_URL}
      - TICKETING_API_KEY=${TICKETING_API_KEY}
      - MCP_SERVER_PORT=3001
      - MCP_SERVER_API_KEY=${MCP_SERVER_API_KEY}
      - DEBUG=false
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3001/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s
